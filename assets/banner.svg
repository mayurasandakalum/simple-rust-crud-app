<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1108"/>
      <stop offset="0.55" stop-color="#241505"/>
      <stop offset="1" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f74c00"/>
      <stop offset="1" stop-color="#ffb86b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#f74c00" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f74c00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="16" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="299" rx="15.5" stroke="#f74c00" stroke-opacity="0.25"/>

  <!-- faint grid -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <path d="M0 75h1200M0 150h1200M0 225h1200"/>
    <path d="M150 0v300M300 0v300M450 0v300M600 0v300M750 0v300M900 0v300M1050 0v300"/>
  </g>

  <!-- gear (rust motif) -->
  <g transform="translate(985 150)">
    <g fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.9">
      <circle r="62"/>
      <circle r="30"/>
      <g id="teeth">
        <path d="M0 -84v-14"/>
        <path d="M42 -72.7l7 -12.1"/>
        <path d="M72.7 -42l12.1 -7"/>
        <path d="M84 0h14"/>
        <path d="M72.7 42l12.1 7"/>
        <path d="M42 72.7l7 12.1"/>
        <path d="M0 84v14"/>
        <path d="M-42 72.7l-7 12.1"/>
        <path d="M-72.7 42l-12.1 7"/>
        <path d="M-84 0h-14"/>
        <path d="M-72.7 -42l-12.1 -7"/>
        <path d="M-42 -72.7l-7 -12.1"/>
      </g>
    </g>
    <!-- lightning bolt in the middle -->
    <path d="M8 -20 L-14 6 h12 L-8 26 L16 -4 h-13 Z" fill="url(#accent)"/>
  </g>

  <!-- title -->
  <text x="80" y="128" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#f5efe8" letter-spacing="-1">Rust CRUD API</text>
  <text x="80" y="172" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#c9beb2">A tiny, fast task API — Axum · Tokio · zero database required</text>

  <!-- method chips -->
  <g font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="15" font-weight="600">
    <rect x="80" y="203" width="66" height="30" rx="15" fill="#22c55e" fill-opacity="0.16" stroke="#22c55e" stroke-opacity="0.5"/>
    <text x="113" y="223" fill="#4ade80" text-anchor="middle">GET</text>
    <rect x="156" y="203" width="74" height="30" rx="15" fill="#3b82f6" fill-opacity="0.16" stroke="#3b82f6" stroke-opacity="0.5"/>
    <text x="193" y="223" fill="#60a5fa" text-anchor="middle">POST</text>
    <rect x="240" y="203" width="66" height="30" rx="15" fill="#eab308" fill-opacity="0.16" stroke="#eab308" stroke-opacity="0.5"/>
    <text x="273" y="223" fill="#facc15" text-anchor="middle">PUT</text>
    <rect x="316" y="203" width="92" height="30" rx="15" fill="#ef4444" fill-opacity="0.16" stroke="#ef4444" stroke-opacity="0.5"/>
    <text x="362" y="223" fill="#f87171" text-anchor="middle">DELETE</text>
  </g>
</svg>
